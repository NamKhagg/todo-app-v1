<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="todo-card">
        <!--Header -->
        <div class="todo-header">
            <h1 class="todo-title">Todo List</h1>
            <p>Let's have a hard-working day</p>
        </div>

        <!-- Input Area-->
        <div class="todo-content">
            <div class="todo-input">
                <input class="todo-field" type="text" placeholder="Fill your task">
                <button type="button" class="add-btn">Add</button>                
            </div>
        </div>

        <!-- Search Area -->
        <div class="filter-search">
            <div class="todo-filter">
                <span class="all">All</span>
                <span class="in-progress">In Progress</span>
                <span class="done">Done</span>
            </div>
            
            <div class="todo-search">
                <input class="search-field" type="text" placeholder="search your task">
                <span class="search-icon">🔍</span>
            </div>

            <div class="mark-all-as-done">
                <button class="mark-all-as-done-button">✓ Complete all</button>
            </div>

        </div>

        <div class="card-info">
            <div class="stat-card total-task">
                <span class="stat-icon-bg total-task-icon-background">
                    <svg class="stat-icon total-task-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-icon lucide-calendar"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                </span>
                <div class="stat-info total-task-info">
                    <span class="total-name">Total Tasks</span>
                    <span class="total-number"></span>
                </div>
            </div>

            <div class="stat-card inprogress-task">
                <span class="stat-icon-bg inprogress-icon-background">
                    <svg class="stat-icon done-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-boxes-icon lucide-boxes"><path d="M2.97 12.92A2 2 0 0 0 2 14.63v3.24a2 2 0 0 0 .97 1.71l3 1.8a2 2 0 0 0 2.06 0L12 19v-5.5l-5-3-4.03 2.42Z"/><path d="m7 16.5-4.74-2.85"/><path d="m7 16.5 5-3"/><path d="M7 16.5v5.17"/><path d="M12 13.5V19l3.97 2.38a2 2 0 0 0 2.06 0l3-1.8a2 2 0 0 0 .97-1.71v-3.24a2 2 0 0 0-.97-1.71L17 10.5l-5 3Z"/><path d="m17 16.5-5-3"/><path d="m17 16.5 4.74-2.85"/><path d="M17 16.5v5.17"/><path d="M7.97 4.42A2 2 0 0 0 7 6.13v4.37l5 3 5-3V6.13a2 2 0 0 0-.97-1.71l-3-1.8a2 2 0 0 0-2.06 0l-3 1.8Z"/><path d="M12 8 7.26 5.15"/><path d="m12 8 4.74-2.85"/><path d="M12 13.5V8"/></svg>                
                </span>
                    <div class="stat-info inprogress-info">
                    <span class="inProgress-name">In-progress</span>
                    <span class="inProgress-number"></span>
                </div>
            </div>

            <div class="stat-card done-task">
                <span class="stat-icon-bg done-icon-background">
                    <svg class="stat-icon done-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-check-icon lucide-calendar-check"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/></svg>                </span>
                <div class="stat-info done-info">
                    <span class="done-name">Done</span>
                    <span class="done-number"></span>
                </div>
            </div>

            <div class="progress-stat stat-card">
                <div class="stat-info">
                    <span>Progress</span>
                     <strong class="progress-percent">66%</strong>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Todo tasks list-->
        <ul class="todo-list">
        </ul>

        <div class="todo-footer">
            <span class="task-remains">
                <span class="task-count"></span>
                <span class="task-remains-content"></span>
            </span>
            <span class="delete-all-done">Delete all done task</span>
        </div>
    </div>


    <!-- Toast Message-->
    <div class="toast-mess">
        <span>Congrat ! Create task successfully</span>
    </div>

    <script src="./app.js"></script>
</body>
</html>
