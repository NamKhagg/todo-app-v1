<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Todo List</h1>
            <p>Let's have a hard-working day</p>
        </div>
        <div class="content">
            <div class="todo-inpt">
                <input type="text" placeholder="Fill your task">
                <button class="add-btn">Add</button>                
            </div>
        </div>
        <ul class="todo-list">
                <li>
                    <div class="todo-item">
                        <span class="checkbox"></span>
                        <span class="item-content">Checklist</span>
                    </div>
                    <button class="del-btn">X</button>
                </li>
        </ul>
    </div>
</body>
</html>
